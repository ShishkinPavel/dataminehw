auto_label:
  batch_size: 16
  candidate_labels:
  - positive
  - negative
  model: facebook/bart-large-mnli
modality: text
paths:
  export: final-project/export/labelstudio_import.json
  labeled: final-project/data/labeled/dataset_labeled.csv
  low_confidence: final-project/review_queue.csv
  report: final-project/reports/annotation_report.md
  spec: final-project/specs/annotation_spec.md
quality:
  confidence_threshold: 0.7
